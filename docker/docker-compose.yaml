services:
  unifi-os-server:
    image: ghcr.io/lemker/unifi-os-server:latest
    hostname: controller.${HOST}
    container_name: unifi-os-server
    cgroup: host
    cap_add: [NET_RAW, NET_ADMIN]
    extra_hosts: [host.docker.internal:host-gateway]
    tmpfs: [/run:exec, /run/lock, /tmp:exec, /var/lib/journal, /var/opt/unifi/tmp:size=64m]
    environment:
      UOS_SYSTEM_IP: ${HOST}
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - /var/lib/iserv/server-unifios/persistent:/persistent
      - /var/log/iserv/server-unifios:/var/log
      - /var/lib/iserv/server-unifios/data:/data
      - /var/lib/iserv/server-unifios/srv:/srv
      - /var/lib/iserv/server-unifios/unifi:/var/lib/unifi
      - /var/lib/iserv/server-unifios/mongodb:/var/lib/mongodb
      - /var/lib/iserv/server-unifios/rabbitmq-ssl:/etc/rabbitmq/ssl
    ports:
      - 11443:443
      - 5005:5005
      - 9543:9543
      - 6789:6789
      - 8080:8080
      - 8444:8444
      - 3478:3478/udp
      - 5514:5514/udp
      - 10003:10003/udp
      - 127.0.0.1:11084:11084
      - 5671:5671
      - 8880:8880
      - 8881:8881
      - 8882:8882
    restart: unless-stopped
    networks: [unifi-os-server]
networks:
  unifi-os-server:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-unifi
    ipam:
      config: [{subnet: 198.18.2.0/24}]
